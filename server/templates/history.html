{{define "history"}}
{{template "layout" map "Title" "History" "Active" "history" "Data" .}}
{{end}}

{{define "content"}}
<div class="page-header">
    <h1 data-t="history">Lịch sử CAPTCHA</h1>
    <div class="header-actions">
        <select id="filter-agent" class="input input-sm" onchange="filterHistory()">
            <option value="" data-t="all_agents">Tất cả Agent</option>
            {{range .Data.Agents}}
            <option value="{{.ID}}">{{.Name}}</option>
            {{end}}
        </select>
        <select id="filter-result" class="input input-sm" onchange="filterHistory()">
            <option value="" data-t="all_results">Tất cả kết quả</option>
            <option value="success" data-t="success">Thành công</option>
            <option value="fail" data-t="fail">Thất bại</option>
            <option value="miss" data-t="miss">Bỏ lỡ</option>
        </select>
        <button class="btn btn-danger btn-sm" onclick="clearAllHistory()">Xoá tất cả</button>
    </div>
</div>

<table class="data-table" id="history-table">
    <thead>
        <tr>
            <th data-t="time">Thời gian</th>
            <th data-t="agent">Agent</th>
            <th data-t="captcha">Mã CAPTCHA</th>
            <th data-t="answer">Câu trả lời</th>
            <th data-t="result">Kết quả</th>
            <th data-t="resp_time">Thời gian PH</th>
            <th></th>
        </tr>
    </thead>
    <tbody id="history-body">
        <tr id="history-loading"><td colspan="7" class="text-center">Loading...</td></tr>
    </tbody>
</table>

<script>
(function() {
    fetch('/api/history')
    .then(r => r.json())
    .then(data => {
        const tbody = document.getElementById('history-body');
        const loading = document.getElementById('history-loading');
        if (loading) loading.remove();
        if (!data || data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="text-center" data-t="no_data">Chưa có dữ liệu</td></tr>';
            return;
        }
        const frag = document.createDocumentFragment();
        data.forEach(h => {
            const tr = document.createElement('tr');
            tr.className = 'result-' + h.result + ' history-row';
            tr.id = 'record-' + h.id;
            tr.dataset.agent = h.agent_id;
            tr.dataset.result = h.result;
            const sentAt = new Date(h.sent_at).toLocaleString('sv-SE').replace('T', ' ');
            tr.innerHTML =
                '<td>' + sentAt + '</td>' +
                '<td><a href="/agents/' + h.agent_id + '" style="color:var(--accent);text-decoration:none">' + (h.agent_name || h.agent_id) + '</a></td>' +
                '<td><code>' + h.captcha_text + '</code></td>' +
                '<td>' + (h.answer || '-') + '</td>' +
                '<td><span class="badge badge-' + h.result + '">' + h.result + '</span></td>' +
                '<td>' + (h.response_ms ? h.response_ms + 'ms' : '-') + '</td>' +
                '<td><button class="btn btn-danger btn-sm" onclick="deleteRecord(' + h.id + ')" title="Xoá">✕</button></td>';
            frag.appendChild(tr);
        });
        tbody.appendChild(frag);
        if (typeof filterHistory === 'function') filterHistory();
    })
    .catch(() => {
        const loading = document.getElementById('history-loading');
        if (loading) loading.innerHTML = '<td colspan="7" class="text-center">Error loading history</td>';
    });
})();
</script>
{{end}}
