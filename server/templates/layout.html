    let currentLang = localStorage.getItem('captcha_lang') || 'vi';
    function t(key) { return (LANG[currentLang] && LANG[currentLang][key]) || key; }
    function switchLang(lang) {
        currentLang = lang;
        localStorage.setItem('captcha_lang', lang);
        document.querySelectorAll('[data-t]').forEach(el => {
            if (el.tagName === 'OPTION') {
                el.textContent = t(el.dataset.t);
            } else {
                el.textContent = t(el.dataset.t);
            }
        });
        document.querySelectorAll('[data-tp]').forEach(el => el.placeholder = t(el.dataset.tp));
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
    }

<body>
    <nav class="sidebar">
        <div class="logo">CAPTCHA Monitor</div>
        <div class="lang-switch">
            <button class="lang-btn" data-lang="vi" onclick="switchLang('vi')">VN</button>
            <button class="lang-btn" data-lang="zh" onclick="switchLang('zh')">CN</button>
        </div>
        <a href="/" class="nav-link{{if eq .Active "dashboard"}} active{{end}}" data-t="dashboard">Trang chính</a>
        <a href="/agents" class="nav-link{{if eq .Active "agents"}} active{{end}}" data-t="agents">Danh sách Agent</a>
        <a href="/history" class="nav-link{{if eq .Active "history"}} active{{end}}" data-t="history">Lịch sử</a>
        <a href="/settings" class="nav-link{{if eq .Active "settings"}} active{{end}}" data-t="settings">Cài đặt</a>
    </nav>
    <main class="content">
        <div id="alert-bar"></div>
        {{template "content" .}}
    </main>
    <script src="/static/js/app.js"></script>
    <script>switchLang(currentLang);</script>
</body>
