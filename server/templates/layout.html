{{define "layout"}}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAPTCHA Monitor</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230078d4'/><text x='50' y='68' font-size='50' text-anchor='middle' fill='white' font-family='Segoe UI'>C</text></svg>">
    <link rel="stylesheet" href="/static/css/win10ui.css">
    <style>
    html, body { height: 100%; margin: 0; overflow: hidden; }
    body.dark { display: flex; font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif; }

    /* Sidebar */
    .app-sidebar {
        width: 230px; min-width: 230px; height: 100vh;
        background: var(--surface); border-right: 1px solid var(--border);
        display: flex; flex-direction: column; position: fixed; top: 0; left: 0; z-index: 50;
    }
    .app-sidebar .logo {
        padding: 18px 20px; font-size: 17px; font-weight: 700;
        color: var(--accent); border-bottom: 1px solid var(--border);
        display: flex; align-items: center; gap: 10px;
    }
    .app-sidebar .logo svg { width: 22px; height: 22px; fill: var(--accent); }
    .sidebar-nav { flex: 1; padding: 8px 0; }
    .sidebar-nav a {
        display: flex; align-items: center; gap: 10px;
        padding: 11px 20px; color: var(--text-secondary);
        text-decoration: none; font-size: 14px; transition: all .15s;
        border-left: 3px solid transparent;
    }
    .sidebar-nav a:hover { background: var(--hover); color: var(--text); }
    .sidebar-nav a.active { background: var(--active); color: var(--accent); border-left-color: var(--accent); font-weight: 600; }
    .sidebar-nav a svg { width: 18px; height: 18px; fill: currentColor; opacity: .7; }
    .sidebar-nav a.active svg { opacity: 1; }

    /* Lang switch */
    .lang-switch { padding: 10px 16px; border-top: 1px solid var(--border); display: flex; gap: 6px; }
    .lang-btn {
        padding: 4px 14px; border: 1px solid var(--border); border-radius: 4px;
        background: transparent; color: var(--text-secondary); cursor: pointer;
        font-size: 12px; font-weight: 600; transition: all .15s;
    }
    .lang-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .lang-btn:hover { border-color: var(--accent); }

    /* Main content */
    .app-main {
        margin-left: 230px; flex: 1; height: 100vh; overflow-y: auto;
        padding: 28px 32px; background: var(--body-bg);
    }

    /* Page header */
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
    .page-header h1 { font-size: 22px; font-weight: 600; margin: 0; }
    .header-actions { display: flex; gap: 8px; align-items: center; }

    /* Stats grid */
    .stats-grid {
        display: grid; grid-template-columns: repeat(auto-fit, minmax(155px, 1fr));
        gap: 14px; margin-bottom: 24px;
    }
    .stat-card {
        background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
        padding: 18px; text-align: center; transition: border-color .15s;
    }
    .stat-card:hover { border-color: var(--accent); }
    .stat-value { font-size: 30px; font-weight: 700; color: var(--text); }
    .stat-label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; text-transform: uppercase; letter-spacing: .5px; }
    .stat-card.stat-success .stat-value { color: var(--success); }
    .stat-card.stat-danger .stat-value { color: var(--danger); }
    .stat-card.stat-warning .stat-value { color: var(--warning); }

    /* Data tables */
    .data-table {
        width: 100%; border-collapse: collapse; background: var(--surface);
        border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
    }
    .data-table th {
        text-align: center; padding: 11px 14px; font-size: 11px;
        text-transform: uppercase; letter-spacing: .5px; color: var(--text-secondary);
        border-bottom: 1px solid var(--border); background: rgba(0,0,0,.15);
    }
    .data-table td {
        padding: 9px 14px; border-bottom: 1px solid var(--border);
        font-size: 13px; text-align: center;
    }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover { background: var(--hover); }
    .result-miss { background: rgba(255,185,0,.04); }
    .result-fail { background: rgba(232,17,35,.04); }

    /* Badges */
    .badge-success { background: rgba(16,196,105,.12); color: var(--success); }
    .badge-fail { background: rgba(232,17,35,.12); color: var(--danger); }
    .badge-miss { background: rgba(255,185,0,.12); color: var(--warning); }
    .badge-pending { background: rgba(150,150,150,.12); color: var(--text-secondary); }
    .badge-online { background: rgba(16,196,105,.12); color: var(--success); }
    .badge-offline { background: rgba(150,150,150,.12); color: var(--text-secondary); }

    /* Progress bar */
    .progress-bar {
        background: var(--border); border-radius: 4px; height: 20px;
        position: relative; min-width: 90px; overflow: hidden;
    }
    .progress-fill { background: var(--success); height: 100%; border-radius: 4px; transition: width .3s; }
    .progress-bar span {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        font-size: 11px; font-weight: 600;
    }

    /* Text colors */
    .text-success { color: var(--success) !important; }
    .text-danger { color: var(--danger) !important; }
    .text-warning { color: var(--warning) !important; }
    .text-center { text-align: center; }

    code {
        background: rgba(0,120,212,.1); padding: 2px 6px; border-radius: 4px;
        font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 12px;
    }

    /* Settings grid */
    .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; max-width: 1100px; }
    .settings-section {
        background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px;
    }
    .settings-section h2 { font-size: 15px; font-weight: 600; margin: 0 0 14px; color: var(--accent); }
    .form-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .form-half { flex: 1; }
    .form-third { flex: 0.7; }
    .form-group { margin-bottom: 16px; }
    .form-group:last-child { margin-bottom: 0; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 13px; }
    .form-group small { display: block; margin-top: 3px; color: var(--text-secondary); font-size: 11px; }
    .form-group .input, .form-group .select { width: 100%; }
    .form-actions { margin-top: 20px; display: flex; align-items: center; gap: 10px; grid-column: 1 / -1; }

    /* Checkbox */
    .checkbox-label { display: flex !important; align-items: center; gap: 8px; cursor: pointer; }
    .checkbox-label input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--accent); }

    .col-check { width: 38px; text-align: center; }
    .col-check input, .agent-check { cursor: pointer; width: 15px; height: 15px; }
    .actions { white-space: nowrap; }
    .actions .btn { margin-left: 3px; }
    .agent-id { color: var(--text-secondary); font-size: 13px; }
    .input-sm { width: auto; min-width: 150px; padding: 5px 10px; font-size: 12px; }

    /* Modal custom */
    .app-modal {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,.55); z-index: 200; display: flex;
        align-items: center; justify-content: center;
    }
    .app-modal-content {
        background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
        padding: 28px; min-width: 400px; max-width: 500px; box-shadow: 0 8px 30px rgba(0,0,0,.4);
    }
    .app-modal-content h3 { margin: 0 0 14px; font-size: 16px; }
    .modal-actions { margin-top: 14px; display: flex; gap: 8px; }
    .agent-result {
        margin-top: 14px; padding: 14px; background: var(--body-bg);
        border-radius: 8px; border: 1px solid var(--border);
    }
    .agent-result p { margin-bottom: 7px; font-size: 13px; }

    /* Skip time rows */
    .skip-time-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
    .skip-time-row .input { flex: 1; }

    /* Responsive */
    @media (max-width: 900px) {
        .settings-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 768px) {
        .app-sidebar { width: 60px; min-width: 60px; }
        .app-sidebar .logo span, .sidebar-nav a span, .lang-switch { display: none; }
        .sidebar-nav a { justify-content: center; padding: 14px 0; }
        .app-main { margin-left: 60px; padding: 20px; }
    }

    let currentLang = localStorage.getItem('captcha_lang') || 'vi';
    function t(key) { return (LANG[currentLang] && LANG[currentLang][key]) || key; }
    function switchLang(lang) {
        currentLang = lang;
        localStorage.setItem('captcha_lang', lang);
        document.querySelectorAll('[data-t]').forEach(el => el.textContent = t(el.dataset.t));

    <script>
    // SPA-like navigation: swap main content without full page reload
    (function() {
        const main = document.querySelector('.app-main');
        const sidebar = document.querySelector('.sidebar-nav');
        if (!main || !sidebar) return;

        // Prefetch on hover
        const prefetchCache = {};
        sidebar.querySelectorAll('a').forEach(link => {
            link.addEventListener('mouseenter', function() {
                const href = this.getAttribute('href');
                if (!prefetchCache[href]) {
                    prefetchCache[href] = fetch(href).then(r => r.text());
                }
            });
        });

        document.addEventListener('click', function(e) {
            const link = e.target.closest('.sidebar-nav a');
            if (!link) return;
            e.preventDefault();
            const href = link.getAttribute('href');

            // Update active state immediately
            sidebar.querySelectorAll('a').forEach(a => a.classList.remove('active'));
            link.classList.add('active');

            const promise = prefetchCache[href] || fetch(href).then(r => r.text());
            delete prefetchCache[href];

            promise.then(html => {
                const doc = new DOMParser().parseFromString(html, 'text/html');
                const newMain = doc.querySelector('.app-main');
                if (newMain) {
                    main.innerHTML = newMain.innerHTML;
                    // Re-run inline scripts
                    main.querySelectorAll('script').forEach(oldScript => {
                        const newScript = document.createElement('script');
                        if (oldScript.src) { newScript.src = oldScript.src; }
                        else { newScript.textContent = oldScript.textContent; }
                        oldScript.replaceWith(newScript);
                    });
                    // Re-apply language
                    switchLang(currentLang);
                }
                history.pushState(null, '', href);
            });
        });

        window.addEventListener('popstate', function() {
            fetch(location.pathname).then(r => r.text()).then(html => {
                const doc = new DOMParser().parseFromString(html, 'text/html');
                const newMain = doc.querySelector('.app-main');
                if (newMain) {
                    main.innerHTML = newMain.innerHTML;
                    main.querySelectorAll('script').forEach(oldScript => {
                        const newScript = document.createElement('script');
                        if (oldScript.src) { newScript.src = oldScript.src; }
                        else { newScript.textContent = oldScript.textContent; }
                        oldScript.replaceWith(newScript);
                    });
                    switchLang(currentLang);
                }
                // Update sidebar active
                sidebar.querySelectorAll('a').forEach(a => {
                    a.classList.toggle('active', a.getAttribute('href') === location.pathname);
                });
            });
        });
    })();
    </script>
</body>
</html>
